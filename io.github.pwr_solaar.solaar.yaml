app-id: io.github.pwr_solaar.solaar
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: solaar
rename-icon: solaar
rename-desktop-file: solaar.desktop
finish-args:
  - --device=all
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --talk-name=org.gtk.vfs.*
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/gvfsd
  # --restart-on-wake-up support (https://github.com/flathub/io.github.pwr_solaar.solaar/issues/7)
  - --system-talk-name=org.freedesktop.UPower
  - --system-talk-name=org.freedesktop.login1
cleanup:
  - /include
  - /libexec
  - /lib/pkgconfig
  - /lib/*.la
  - /share/doc
  - /share/libdbusmenu
  - /share/gtk-doc
  - /share/gir-1.0
modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  # Generated with flatpak-pip-generator, dependencies found in https://github.com/pwr-Solaar/Solaar/blob/d95068c3f5376e37ec8df36c3a460f1698e7855e/setup.py#L71
  - python3-modules.yaml
  
  - name: dbus-python
    buildsystem: autotools
    cleanup:
      - /include
    sources:
      - type: archive
        url: https://dbus.freedesktop.org/releases/dbus-python/dbus-python-1.4.0.tar.xz
        sha256: c36b28f10ffcc8f1f798aca973bcc132f91f33eb9b6b8904381b4077766043d5
        x-checker-data:
          type: anitya
          project-id: 402
          url-template: https://dbus.freedesktop.org/releases/dbus-python/dbus-python-$version.tar.xz
  - name: solaar
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=/app --root=/
      - sed -i 's|^#!python$|#!/usr/bin/python3|' $FLATPAK_DEST/bin/solaar
      - tools/po-compile.sh
      - |
        for dir in share/locale/*; do
          lang=$(basename $dir)
          install -Dpm644 -t ${FLATPAK_DEST}/share/locale/$lang/LC_MESSAGES $dir/LC_MESSAGES/solaar.mo
        done
    sources:
      - type: archive
        url: https://github.com/pwr-Solaar/Solaar/archive/refs/tags/1.1.18.tar.gz
        sha256: d14b76a362f2a1e53d9d29c05312ec3bd50ba6852280bd20019a29411b4d4669
        x-checker-data:
          type: anitya
          project-id: 11338
          url-template: https://github.com/pwr-Solaar/Solaar/archive/refs/tags/$version.tar.gz
      - type: patch
        path: fix-icon.patch
